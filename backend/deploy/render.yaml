services:
  - type: web
    name: maya-api
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://maya-gitam.vercel.app
