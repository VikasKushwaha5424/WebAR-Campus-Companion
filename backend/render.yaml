services:
  - type: web
    name: maya-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://maya-gitam.vercel.app
